<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Policy Maker — Sign In</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #d4d4d8;
      --surface: #ffffff;
      --border:  #d4d4d8;
      --muted:   #71717a;
      --text:    #18181b;
      --blue:    #2563eb;
      --red:     #dc2626;
      --sans:    -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px 36px;
      width: 100%;
      max-width: 340px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .brand { margin-bottom: 28px; }
    .brand-name { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
    .brand-sub  { font-size: 12px; color: var(--muted); margin-top: 4px; }
    label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
    input {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 14px;
      font-family: var(--sans);
      outline: none;
      transition: border-color .15s;
      color: var(--text);
      background: var(--surface);
    }
    input:focus { border-color: var(--blue); }
    .form-row { margin-bottom: 16px; }
    .form-hint { font-size: 11px; color: var(--muted); margin-top: 5px; }
    .btn {
      width: 100%;
      padding: 10px;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .88; }
    .login-error {
      background: rgba(220,38,38,.08);
      color: var(--red);
      border: 1px solid rgba(220,38,38,.2);
      border-radius: 6px;
      padding: 9px 12px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .login-error.show { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="brand-name">Policy Maker</div>
      <div class="brand-sub">Explore and build AI agent policies</div>
    </div>
    <div class="login-error" id="err">Incorrect password. Try again.</div>
    <form method="POST" action="/login">
      <div class="form-row">
        <label for="email">Account name</label>
        <input type="text" id="email" name="email" autocomplete="username" autofocus required
               placeholder="you@example.com" />
        <div class="form-hint">Any email — your policies are saved to your account.</div>
      </div>
      <div class="form-row">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn">Sign In</button>
    </form>
  </div>
  <script>
    if (location.search.includes('error=1')) {
      document.getElementById('err').classList.add('show');
    }
  </script>
</body>
</html>
